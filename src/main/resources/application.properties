spring.application.name=ofchatbot

# Database Configuration (prod - Railway PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ofchatbot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Database Configuration (local - commented out for prod)
#spring.datasource.url=jdbc:postgresql://localhost:5432/ofchatbot
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8081

# API Keys
gohighlevel.api.token=${GOHIGHLEVEL_API_TOKEN:none}
gohighlevel.api.base-url=https://services.leadconnectorhq.com
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.base-url=${ANTHROPIC_API_BASE_URL:https://api.anthropic.com}

# Creator Configuration
creator.onlyfans.url=https://onlyfans.com/bambiisvoid
creator.name=Bambii

# OnlyFans API Configuration
onlyfans.api.key=${ONLYFANS_API_KEY}
onlyfans.api.base-url=${ONLYFANS_API_BASE_URL:https://app.onlyfansapi.com/api}
onlyfans.account.id=${ONLYFANS_ACCOUNT_ID}

# Step 1: Active replier = replied within this many minutes to one of our last 2-3 messages
pricing.active-reply-minutes=10
# Session window for "2-3 purchases in one session" → $99.95+ (hours)
pricing.session-hours=2
# Re-engaging after cold: if fan had no activity for this many days, next offer $9.95–$19.95
pricing.cold-days=2

# Content script: when true, every fan gets content script (ignore completed). Use for testing only.
script.force-all-fans=false

# Vault sync: runs async on startup. Set false to skip when offline (e.g. app.onlyfansapi.com unreachable).
# vault.sync.on-startup=false

# When explicit purchase intent is detected: wait at least this long before sending PPV, show typing a few times so it doesn't look like a bot.
purchase-intent.ppv.delay-seconds=90
purchase-intent.typing-indicator-count=3